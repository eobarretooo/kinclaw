version: "3.9"
services:
  kinclaw:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./kinclaw.db:/app/kinclaw.db
      - ./kinclaw.log:/app/kinclaw.log
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
